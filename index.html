<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Work Calendar</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    min-height: 100vh;
    padding: 20px;
  }
  
  .container {
    max-width: 1200px;
    margin: 0 auto;
  }
  
  .header {
    background: white;
    border-radius: 16px;
    padding: 24px;
    margin-bottom: 20px;
    box-shadow: 0 4px 6px rgba(0,0,0,0.1);
  }
  
  .header h1 {
    font-size: 24px;
    color: #2d3748;
    margin-bottom: 8px;
  }
  
  .header p {
    color: #718096;
    font-size: 14px;
  }
  
  .calendar-card {
    background: white;
    border-radius: 16px;
    padding: 24px;
    box-shadow: 0 4px 6px rgba(0,0,0,0.1);
  }
  
  .calendar-nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
  }
  
  .calendar-nav h2 {
    font-size: 20px;
    color: #2d3748;
  }
  
  .calendar-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 4px;
  }
  
  .weekday {
    text-align: center;
    font-size: 14px;
    font-weight: 600;
    color: #718096;
    padding: 12px 0;
  }
  
  .day {
    aspect-ratio: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 8px;
    cursor: pointer;
    font-size: 16px;
    font-weight: 500;
    position: relative;
    transition: all 0.2s;
  }
  
  .day:hover {
    background: #f7fafc;
    transform: scale(1.05);
  }
  
  .day.today {
    background: #667eea;
    color: white;
  }
  
  .day.has-file {
    background: #48bb78;
    color: white;
  }
  
  .day.has-file:hover {
    background: #38a169;
  }
  
  .day.other-month {
    color: #e2e8f0;
  }
  
  .file-badge {
    position: absolute;
    bottom: 4px;
    width: 4px;
    height: 4px;
    background: #ffd700;
    border-radius: 50%;
  }
  
  /* Modal */
  .modal {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.5);
    z-index: 1000;
    animation: fadeIn 0.2s;
  }
  
  .modal.active {
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 20px;
  }
  
  .modal-content {
    background: white;
    border-radius: 16px;
    padding: 32px;
    max-width: 800px;
    width: 100%;
    max-height: 90vh;
    overflow-y: auto;
    animation: slideUp 0.3s;
  }
  
  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }
  
  @keyframes slideUp {
    from { transform: translateY(20px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }
  
  .modal-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 24px;
    padding-bottom: 16px;
    border-bottom: 2px solid #edf2f7;
  }
  
  .modal-title {
    font-size: 20px;
    font-weight: 600;
    color: #2d3748;
  }
  
  .close-btn {
    background: none;
    border: none;
    font-size: 24px;
    cursor: pointer;
    color: #718096;
    padding: 4px;
    border-radius: 4px;
  }
  
  .close-btn:hover {
    background: #f7fafc;
    color: #2d3748;
  }
  
  .file-list {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  
  .file-item {
    display: flex;
    align-items: center;
    padding: 16px;
    background: #f7fafc;
    border-radius: 8px;
    transition: all 0.2s;
    cursor: pointer;
  }
  
  .file-item:hover {
    background: #edf2f7;
    transform: translateX(4px);
  }
  
  .file-icon {
    width: 40px;
    height: 40px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    margin-right: 12px;
    flex-shrink: 0;
  }
  
  .file-icon.html {
    background: #ff6b6b;
    color: white;
  }
  
  .file-icon.md {
    background: #4a90d9;
    color: white;
  }
  
  .file-info {
    flex: 1;
  }
  
  .file-name {
    font-size: 16px;
    font-weight: 600;
    color: #2d3748;
    margin-bottom: 4px;
  }
  
  .file-date {
    font-size: 12px;
    color: #718096;
  }
  
  .file-actions {
    display: flex;
    gap: 8px;
  }
  
  .action-btn {
    padding: 6px 12px;
    border-radius: 6px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }
  
  .view-btn {
    background: #667eea;
    color: white;
    text-decoration: none;
  }
  
  .view-btn:hover {
    background: #764ba2;
  }
  
  .no-file {
    text-align: center;
    padding: 40px;
    color: #718096;
  }
  
  .no-file-icon {
    font-size: 48px;
    margin-bottom: 12px;
  }
  
  .stats {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    margin-bottom: 24px;
  }
  
  .stat-card {
    background: #f7fafc;
    padding: 16px;
    border-radius: 8px;
    text-align: center;
  }
  
  .stat-number {
    font-size: 24px;
    font-weight: 700;
    color: #667eea;
    margin-bottom: 4px;
  }
  
  .stat-label {
    font-size: 12px;
    color: #718096;
  }
  
  /* Password protection */
  .password-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 2000;
  }
  
  .password-overlay.hidden {
    display: none;
  }
  
  .password-box {
    background: white;
    padding: 40px;
    border-radius: 16px;
    text-align: center;
    max-width: 400px;
    width: 90%;
  }
  
  .password-box h2 {
    margin-bottom: 8px;
    color: #2d3748;
  }
  
  .password-box p {
    color: #718096;
    margin-bottom: 20px;
  }
  
  .password-input {
    width: 100%;
    padding: 12px;
    border: 2px solid #e2e8f0;
    border-radius: 8px;
    font-size: 16px;
    margin-bottom: 12px;
    text-align: center;
  }
  
  .password-input:focus {
    outline: none;
    border-color: #667eea;
  }
  
  .password-btn {
    width: 100%;
    padding: 12px;
    background: #667eea;
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s;
  }
  
  .password-btn:hover {
    background: #764ba2;
  }
  
  .password-error {
    color: #e53e3e;
    font-size: 14px;
    margin-top: 12px;
    display: none;
  }
</style>
</head>
<body>

<!-- Password Protection -->
<div class="password-overlay" id="passwordOverlay">
  <div class="password-box">
    <div style="font-size: 48px; margin-bottom: 16px;">🔒</div>
    <h2>Access Required</h2>
    <p>Please enter your password</p>
    <input type="password" class="password-input" id="passwordInput" placeholder="Password">
    <button class="password-btn" onclick="checkPassword()">Enter</button>
    <div class="password-error" id="passwordError">Incorrect password, please try again</div>
  </div>
</div>

<!-- Main App -->
<div class="container" id="mainApp" style="display: none;">
  <div class="header">
    <h1>📋 Work Calendar</h1>
    <p>View and manage your daily tasks</p>
  </div>
  
  <div class="calendar-card">
    <div class="stats">
      <div class="stat-card">
        <div class="stat-number" id="totalFiles">0</div>
        <div class="stat-label">Total Files</div>
      </div>
      <div class="stat-card">
        <div class="stat-number" id="activeDays">0</div>
        <div class="stat-label">Active Days</div>
      </div>
      <div class="stat-card">
        <div class="stat-number" id="currentMonth">0</div>
        <div class="stat-label">This Month</div>
      </div>
    </div>
    
    <div class="calendar-nav">
      <h2 id="calendarTitle">July 2026</h2>
      <div style="display: flex; gap: 8px;">
        <button class="action-btn" onclick="changeMonth(-1)" style="background: #667eea; color: white;">← Prev</button>
        <button class="action-btn" onclick="changeMonth(1)" style="background: #667eea; color: white;">Next →</button>
      </div>
    </div>
    
    <div class="calendar-grid" id="calendarGrid">
      <!-- Calendar will be rendered here -->
    </div>
  </div>
</div>

<!-- Day Detail Modal -->
<div class="modal" id="dayModal">
  <div class="modal-content">
    <div class="modal-header">
      <h3 class="modal-title" id="modalTitle">2026-07-05 Details</h3>
      <button class="close-btn" onclick="closeModal()">×</button>
    </div>
    <div class="file-list" id="fileList">
      <!-- Files will be rendered here -->
    </div>
  </div>
</div>

<script>
// File data - will be loaded from GitHub API
const fileData = {
  '2026-07-05': [
    { name: 'Todo List - 2026-07-05.html', type: 'html', url: 'Todo List - 2026-07-05.html' },
    { name: 'Todo List - 2026-07-05.md', type: 'md', url: 'Todo List - 2026-07-05.md' }
  ]
  // Add more dates as they are uploaded
};

// Calendar state
let currentYear = 2026;
let currentMonth = 6; // July (0-indexed)
const fileDateSet = new Set(Object.keys(fileData));

// Generate password hash (simple hash, not secure, just for demo)
const password = localStorage.getItem('cal-password') || '1234'; // Default password

function checkPassword() {
  const input = document.getElementById('passwordInput').value;
  if (input === password) {
    localStorage.setItem('cal-password', password);
    document.getElementById('passwordOverlay').classList.add('hidden');
    document.getElementById('mainApp').style.display = 'block';
    renderCalendar();
    updateStats();
  } else {
    document.getElementById('passwordError').style.display = 'block';
    setTimeout(() => {
      document.getElementById('passwordError').style.display = 'none';
    }, 2000);
  }
}

function changeMonth(delta) {
  currentMonth += delta;
  if (currentMonth > 11) {
    currentMonth = 0;
    currentYear++;
  } else if (currentMonth < 0) {
    currentMonth = 11;
    currentYear--;
  }
  renderCalendar();
}

function updateStats() {
  document.getElementById('totalFiles').textContent = Object.values(fileData).reduce((sum, files) => sum + files.length, 0);
  document.getElementById('activeDays').textContent = fileDateSet.size;
  
  const currentMonthFiles = Object.keys(fileData).filter(date => {
    const [y, m] = date.split('-').map(Number);
    return y === currentYear && m === currentMonth + 1;
  }).reduce((sum, date) => sum + fileData[date].length, 0);
  document.getElementById('currentMonth').textContent = currentMonthFiles;
}

function renderCalendar() {
  const grid = document.getElementById('calendarGrid');
  grid.innerHTML = '';
  
  const title = `${currentYear} ${['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'][currentMonth]}`;
  document.getElementById('calendarTitle').textContent = title;
  
  // Weekday headers
  const weekdays = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
  weekdays.forEach(day => {
    const el = document.createElement('div');
    el.className = 'weekday';
    el.textContent = day;
    grid.appendChild(el);
  });
  
  // First day of month
  const firstDay = new Date(currentYear, currentMonth, 1).getDay();
  const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();
  
  // Previous month padding
  const prevMonthDays = new Date(currentYear, currentMonth, 0).getDate();
  for (let i = firstDay - 1; i >= 0; i--) {
    const el = document.createElement('div');
    el.className = 'day other-month';
    el.textContent = prevMonthDays - i;
    grid.appendChild(el);
  }
  
  // Current month days
  const today = new Date();
  for (let day = 1; day <= daysInMonth; day++) {
    const el = document.createElement('div');
    el.className = 'day';
    el.textContent = day;
    
    const dateStr = `${currentYear}-${String(currentMonth + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
    
    // Today
    if (today.getFullYear() === currentYear && today.getMonth() === currentMonth && today.getDate() === day) {
      el.classList.add('today');
    }
    
    // Has file
    if (fileDateSet.has(dateStr)) {
      el.classList.add('has-file');
      const badge = document.createElement('div');
      badge.className = 'file-badge';
      el.appendChild(badge);
    }
    
    el.onclick = () => showDayDetail(dateStr);
    grid.appendChild(el);
  }
  
  // Next month padding
  const totalCells = firstDay + daysInMonth;
  const remaining = totalCells % 7 === 0 ? 0 : 7 - (totalCells % 7);
  for (let i = 1; i <= remaining; i++) {
    const el = document.createElement('div');
    el.className = 'day other-month';
    el.textContent = i;
    grid.appendChild(el);
  }
}

function showDayDetail(dateStr) {
  const modal = document.getElementById('dayModal');
  const fileList = document.getElementById('fileList');
  const title = document.getElementById('modalTitle');
  
  title.textContent = `${dateStr} Details`;
  
  const files = fileData[dateStr];
  if (!files || files.length === 0) {
    fileList.innerHTML = `
      <div class="no-file">
        <div class="no-file-icon">📭</div>
        <p>No files for this day</p>
      </div>
    `;
  } else {
    fileList.innerHTML = files.map(file => `
      <div class="file-item" onclick="window.open('${file.url}', '_blank')">
        <div class="file-icon ${file.type}">
          ${file.type === 'html' ? '🌐' : '📄'}
        </div>
        <div class="file-info">
          <div class="file-name">${file.name}</div>
          <div class="file-date">${file.type === 'html' ? 'HTML Visual File' : 'Markdown Text File'}</div>
        </div>
        <div class="file-actions">
          <a href="${file.url}" target="_blank" class="action-btn view-btn">View</a>
        </div>
      </div>
    `).join('');
  }
  
  modal.classList.add('active');
}

function closeModal() {
  document.getElementById('dayModal').classList.remove('active');
}

// Close modal on outside click
document.getElementById('dayModal').addEventListener('click', function(e) {
  if (e.target === this) {
    closeModal();
  }
});

// Initialize
if (localStorage.getItem('cal-password')) {
  document.getElementById('passwordOverlay').classList.add('hidden');
  document.getElementById('mainApp').style.display = 'block';
  renderCalendar();
  updateStats();
}
</script>
</body>
</html>
