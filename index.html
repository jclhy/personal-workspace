<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📋 工作日历 - 欢迎</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            padding: 20px;
        }
        .card {
            background: white;
            border-radius: 24px;
            padding: 48px;
            text-align: center;
            max-width: 600px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .icon {
            font-size: 72px;
            margin-bottom: 24px;
        }
        h1 {
            color: #2d3748;
            margin-bottom: 12px;
            font-size: 32px;
        }
        p {
            color: #718096;
            margin-bottom: 32px;
            font-size: 16px;
            line-height: 1.6;
        }
        .btn {
            display: inline-block;
            padding: 16px 32px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-decoration: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 600;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
        }
        .features {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
            margin: 32px 0;
        }
        .feature {
            background: #f7fafc;
            padding: 16px;
            border-radius: 12px;
        }
        .feature-icon {
            font-size: 32px;
            margin-bottom: 8px;
        }
        .feature-title {
            font-weight: 600;
            color: #2d3748;
            margin-bottom: 4px;
        }
        .feature-desc {
            font-size: 12px;
            color: #718096;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon">📋</div>
        <h1>欢迎使用工作日历</h1>
        <p>管理你的每日待办事项，随时随地查看工作进度</p>
        
        <div class="features">
            <div class="feature">
                <div class="feature-icon">📅</div>
                <div class="feature-title">日历视图</div>
                <div class="feature-desc">按月查看待办事项</div>
            </div>
            <div class="feature">
                <div class="feature-icon">🔒</div>
                <div class="feature-title">安全访问</div>
                <div class="feature-desc">密码保护你的数据</div>
            </div>
            <div class="feature">
                <div class="feature-icon">📊</div>
                <div class="feature-title">统计分析</div>
                <div class="feature-desc">查看工作进展</div>
            </div>
        </div>
        
        <a href="工作日历.html" class="btn">进入日历</a>
    </div>
</body>
</html>
