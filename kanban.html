const PWD_HASH = 'b961b62afaad57c885b92af580d6611a0729a0dca1cd15bad2dd61f6a77d3ecf';

async function sha256(str) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

async function checkPassword() {
  const input = document.getElementById('pwdInput').value;
  const hash = await sha256(input);
  if (hash === PWD_HASH) {
    sessionStorage.setItem('kanban_auth', '1');
    document.getElementById('loginOverlay').style.display = 'none';
    document.getElementById('appContent').style.display = 'block';

  } else {
    document.getElementById('loginError').textContent = '密码不正确，请重试';
    document.getElementById('pwdInput').value = '';
    document.getElementById('pwdInput').focus();
  }
}

document.getElementById('pwdInput').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') checkPassword();
});

function populateArchiveMonths() {
  const months = [...new Set(ARCHIVED_TASKS.map(t => t.archived_date?.substring(0, 7) || 'unknown'))].sort().reverse();
  const select = document.getElementById('archiveMonthFilter');
  months.forEach(m => {
    const opt = document.createElement('option');
    opt.value = m;
    opt.textContent = m === 'unknown' ? '未知日期' : m + '月';
    select.appendChild(opt);
  });
}

function renderArchive() {
  const monthFilter = document.getElementById('archiveMonthFilter').value;
  const search = document.getElementById('archiveSearchBox').value.toLowerCase();
  
  let filtered = ARCHIVED_TASKS;
  if (monthFilter) {
    filtered = filtered.filter(t => (t.archived_date || '').startsWith(monthFilter));
  }
  if (search) {
    filtered = filtered.filter(t => 
      t.id.toLowerCase().includes(search) || 
      t.name.toLowerCase().includes(search) ||
      (t.project || '').toLowerCase().includes(search) ||
      (t.note || '').toLowerCase().includes(search)
    );
  }
  
  const container = document.getElementById('archiveTableContainer');
  
  if (filtered.length === 0) {
    container.innerHTML = '<div class="archive-empty">📭 暂无匹配的归档任务</div>';
    return;
  }
  
  const statusBadge = (status) => {
    const map = {
      '已完成': 'status-completed',
      '已封存': 'status-paused',
      '暂停': 'status-paused'
    };
    return `<span class="meta-tag ${map[status] || ''}">${status}</span>`;
  };
  
  let html = `<table class="archive-table">
    <thead>
      <tr>
        <th>ID</th>
        <th>任务名称</th>
        <th>状态</th>
        <th>优先级</th>
        <th>所属项目</th>
        <th>归档日期</th>
      </tr>
    </thead>
    <tbody>`;
  
  filtered.sort((a, b) => (b.archived_date || '').localeCompare(a.archived_date || ''));
  
  filtered.forEach(t => {
    html += `<tr>
      <td><strong>${t.id}</strong></td>
      <td>${t.name}</td>
      <td>${statusBadge(t.status)}</td>
      <td>${t.priority}</td>
      <td>${t.project || '—'}</td>
      <td>${t.archived_date || '—'}</td>
    </tr>`;
  });
  
  html += '</tbody></table>';
  html += `<div style="margin-top:12px;font-size:12px;color:#86868b;">共 ${filtered.length} 条归档记录</div>`;
  
  container.innerHTML = html;
}

function toggleArchive() {
  const panel = document.getElementById('archivePanel');
  panel.style.display = panel.style.display === 'none' ? 'block' : 'none';
}

// ========== 看板渲染 ==========
const SECTIONS = [
  { cat:"E", title:"消耗型任务", subtitle:"必须做，优先清掉", icon:"🔥", color:"#c41e3a" },
  { cat:"C", title:"建设型·内容资产", subtitle:"长期价值最高", icon:"📚", color:"#ff9500" },
  { cat:"T", title:"建设型·技术项目", subtitle:"产品与技术", icon:"⚙️", color:"#2557a7" },
  { cat:"ED", title:"建设型·教育业务", subtitle:"教育产品与合作", icon:"🎓", color:"#34c759" },
  { cat:"B", title:"建设型·商业变现", subtitle:"收入与客户", icon:"💰", color:"#af52de" },
  { cat:"D", title:"已完成/维持型", subtitle:"保持运行即可", icon:"✅", color:"#8e8e93" },
  { cat:"L", title:"个人成长/学习", subtitle:"基础与支撑", icon:"🌱", color:"#5ac8fa" },
];

const STATUS_MAP = { "✅":"completed", "⏳":"inprogress", "🔴":"pending", "❌":"notstarted", "⏸️":"paused", "⚠️":"deferred" };
const PRIORITY_MAP = { "P0":"p0", "P1":"p1", "P2":"p2", "P3":"p3", "暂缓":"deferred" };

function renderStats(filtered) {
  const total = filtered.length;
  const completed = filtered.filter(t=>t.status==="✅").length;
  const inprogress = filtered.filter(t=>t.status==="⏳").length;
  const pending = filtered.filter(t=>t.status==="🔴"||t.status==="❌").length;
  const archivedCount = ARCHIVED_TASKS.length;
  document.getElementById('statsBar').innerHTML = `
    <div class="stat-chip total"><span class="num">${total}</span>活跃</div>
    <div class="stat-chip completed"><span class="num">${completed}</span>已完成</div>
    <div class="stat-chip inprogress"><span class="num">${inprogress}</span>进行中</div>
    <div class="stat-chip pending"><span class="num">${pending}</span>待推进</div>
    <div class="stat-chip archived"><span class="num">${archivedCount}</span>已归档</div>
  `;
}

function renderCard(t) {
  const sc = STATUS_MAP[t.status]||"pending";
  const pc = PRIORITY_MAP[t.priority]||"p3";
  const catColor = SECTIONS.find(s=>s.cat===t.cat)?.color||"#999";
  let detailsHtml = '';
  if (t.details) {
    detailsHtml = '<div class="card-details">';
    for (const [k,v] of Object.entries(t.details)) {
      detailsHtml += `<div><span class="detail-label">${k}：</span>${v}</div>`;
    }
    detailsHtml += '</div>';
  }
  return `
    <div class="card" data-id="${t.id}" data-cat="${t.cat}" data-status="${t.status}" data-priority="${t.priority}" data-owner="${t.owner}" data-search="${t.title} ${t.desc} ${t.owner} ${t.id}">
      <div class="card-top">
        <span class="card-id" style="background:${catColor}">${t.id}</span>
        <span class="meta-tag status-${sc}">${t.status} ${t.statusLabel}</span>
      </div>
      <div class="card-title">${t.title}</div>
      <div class="card-desc">${t.desc}</div>
      <div class="card-meta">
        <span class="meta-tag priority-${pc}">${t.priority==='暂缓'?'⏸️ 暂缓':'🎯 '+t.priority}</span>
        ${t.owner!=='—'?`<span class="meta-tag owner-tag">👤 ${t.owner}</span>`:''}
      </div>
      ${detailsHtml}
    </div>`;
}

function renderAll(filtered) {
  if (!filtered) filtered = TASKS;
  renderStats(filtered);
  const main = document.getElementById('mainContent');
  let html = '';
  let hasResult = false;
  for (const sec of SECTIONS) {
    const secTasks = filtered.filter(t=>t.cat===sec.cat);
    if (secTasks.length === 0) continue;
    hasResult = true;
    html += `<div class="section" data-cat="${sec.cat}">
      <div class="section-header" onclick="toggleSection(this)">
        <div class="section-icon" style="background:${sec.color}">${sec.icon}</div>
        <h2>${sec.title}</h2>
        <span class="section-count">${secTasks.length}项</span>
        <span class="section-subtitle" style="font-size:13px;color:#86868b;margin-left:8px">${sec.subtitle}</span>
        <span class="section-toggle">▼ 收起</span>
      </div>
      <div class="cards">${secTasks.map(renderCard).join('')}</div>
    </div>`;
  }
  if (!hasResult) html = '<div class="no-results">🔍 没有匹配的任务，试试调整筛选条件</div>';
  main.innerHTML = html;
}

function toggleSection(header) {
  const section = header.parentElement;
  section.classList.toggle('collapsed');
  const toggle = header.querySelector('.section-toggle');
  toggle.textContent = section.classList.contains('collapsed') ? '▶ 展开' : '▼ 收起';
}

function filterCards() {
  const search = document.getElementById('searchBox').value.toLowerCase();
  const status = document.getElementById('statusFilter').value;
  const priority = document.getElementById('priorityFilter').value;
  const owner = document.getElementById('ownerFilter').value;
  const category = document.getElementById('categoryFilter').value;
  const filtered = TASKS.filter(t => {
    if (search && !(t.id.toLowerCase().includes(search) || t.title.toLowerCase().includes(search) || t.desc.toLowerCase().includes(search) || t.owner.includes(search))) return false;
    if (status && t.status !== status) return false;
    if (priority && t.priority !== priority) return false;
    if (owner && t.owner !== owner && !t.owner.includes(owner)) return false;
    if (category && t.cat !== category) return false;
    return true;
  });
  renderAll(filtered);
}

// Initial render
renderAll();
